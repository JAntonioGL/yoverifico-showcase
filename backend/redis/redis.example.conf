# ==========================================================
# Archivo: redis.example.conf
# Plantilla de configuración para entornos de desarrollo
# Copiar a redis.conf y reemplazar la contraseña.
# ==========================================================

protected-mode yes

# 🔐 Cambia esta contraseña antes de usar
requirepass CAMBIA_ESTA_PASSWORD

# 💾 Persistencia (RDB cada 60s si hubo >=1000 escrituras)
save 60 1000
appendonly no

# 🧠 Límite de memoria y política de eliminación
maxmemory 128mb
maxmemory-policy allkeys-lru
